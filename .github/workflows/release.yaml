name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  OPERATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/agentops-operator
  GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/mcp-gateway
  TOKEN_INJECTOR_IMAGE: ghcr.io/${{ github.repository_owner }}/token-injector

permissions:
  contents: write
  packages: write

jobs:
  # =========================================================================
  # Go: lint + test operator
  # =========================================================================
  operator-check:
    name: Operator Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=10m
      - name: Test
        run: make test
      - name: Build
        run: go build -o bin/manager cmd/main.go

  # =========================================================================
  # Go: build + test mcp-gateway
  # =========================================================================
  gateway-check:
    name: Gateway Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/mcp-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o mcp-gateway .
      - name: Test
        run: go test ./...

  # =========================================================================
  # Go: build + test token-injector
  # =========================================================================
  token-injector-check:
    name: Token Injector Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: images/token-injector
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o token-injector .
      - name: Test
        run: go test ./...

  # =========================================================================
  # Docker: build per-arch on native runners, then merge into multi-arch manifest
  # =========================================================================
  docker-operator-build:
    name: Build Operator (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [operator-check]
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    outputs:
      image: ${{ env.OPERATOR_IMAGE }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.OPERATOR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=operator-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=operator-${{ matrix.platform }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-operator-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-operator:
    name: Release Operator
    runs-on: ubuntu-latest
    needs: [docker-operator-build]
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-operator-*
          merge-multiple: true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.OPERATOR_IMAGE }}:${{ steps.version.outputs.version }} \
            -t ${{ env.OPERATOR_IMAGE }}:latest \
            $(printf '${{ env.OPERATOR_IMAGE }}@sha256:%s ' *)

  docker-gateway-build:
    name: Build Gateway (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [gateway-check]
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: images/mcp-gateway
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.GATEWAY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=gateway-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=gateway-${{ matrix.platform }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-gateway-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-gateway:
    name: Release Gateway
    runs-on: ubuntu-latest
    needs: [docker-gateway-build]
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-gateway-*
          merge-multiple: true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.GATEWAY_IMAGE }}:${{ steps.version.outputs.version }} \
            -t ${{ env.GATEWAY_IMAGE }}:latest \
            $(printf '${{ env.GATEWAY_IMAGE }}@sha256:%s ' *)

  docker-token-injector-build:
    name: Build Token Injector (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [token-injector-check]
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: images/token-injector
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.TOKEN_INJECTOR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=token-injector-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=token-injector-${{ matrix.platform }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-token-injector-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-token-injector:
    name: Release Token Injector
    runs-on: ubuntu-latest
    needs: [docker-token-injector-build]
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-token-injector-*
          merge-multiple: true
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.TOKEN_INJECTOR_IMAGE }}:${{ steps.version.outputs.version }} \
            -t ${{ env.TOKEN_INJECTOR_IMAGE }}:latest \
            $(printf '${{ env.TOKEN_INJECTOR_IMAGE }}@sha256:%s ' *)

  # =========================================================================
  # Helm: package chart, push OCI to GHCR
  # =========================================================================
  helm-chart:
    name: Release Helm Chart
    needs: [operator-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Sync CRDs into chart
        run: make sync-crds
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Extract chart name
        id: meta
        run: |
          CHART_NAME=$(grep '^name:' charts/agentops-operator/Chart.yaml | awk '{print $2}')
          echo "chart-name=${CHART_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact=${CHART_NAME}-${{ steps.version.outputs.version }}.tgz" >> "$GITHUB_OUTPUT"
      - name: Set chart version and appVersion
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/agentops-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/agentops-operator/Chart.yaml
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Helm Lint
        run: helm lint charts/agentops-operator
      - name: Helm Package
        run: helm package charts/agentops-operator --destination dist/
      - name: Push Helm chart to OCI registry
        run: helm push dist/${{ steps.meta.outputs.artifact }} oci://ghcr.io/samyn92/charts
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/${{ steps.meta.outputs.artifact }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      chart-artifact: ${{ steps.meta.outputs.artifact }}

  # =========================================================================
  # GitHub Release with CRD manifests + Helm chart
  # =========================================================================
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker-operator, docker-gateway, docker-token-injector, helm-chart]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Generate CRD manifests
        run: make manifests
      - name: Package install manifests
        run: make build-installer IMG=${{ env.OPERATOR_IMAGE }}:${GITHUB_REF_NAME#v}
      - name: Download Helm chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "AgentOps ${{ github.ref_name }}" \
            --generate-notes \
            dist/install.yaml \
            dist/${{ needs.helm-chart.outputs.chart-artifact }}

  # =========================================================================
  # Notify: dispatch version bump to agentops-platform
  # =========================================================================
  notify-platform:
    name: Notify Platform
    runs-on: ubuntu-latest
    needs: [github-release]
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Dispatch to agentops-platform
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          repository: samyn92/agentops-platform
          event-type: dependency-update
          client-payload: |
            {
              "component": "agentops-operator",
              "version": "${{ steps.version.outputs.version }}",
              "source": "agentops-core"
            }
